# YoLingo Decap CMS configuration
# IMPORTANT: Change repo below if your GitHub username or repository name is different.
backend:
  name: github
  repo: mika0821/YoLingo-school
  branch: main
  # For GitHub Pages live login, you need a GitHub OAuth proxy.
  # After you set it up, add it here, for example:
  # base_url: https://your-decap-oauth-worker.yourname.workers.dev
  # auth_endpoint: auth

# Good for local testing only. Run: npx decap-server
local_backend: true

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "content/site.json"
        fields:
          - { label: "Brand Name", name: "brand_name", widget: "string" }
          - { label: "Footer Description", name: "footer_description", widget: "text" }
          - { label: "Main Email", name: "email", widget: "string" }
          - { label: "Email Link", name: "email_href", widget: "string", hint: "Example: mailto:contact@yolingo.info" }
          - { label: "Support Email", name: "support_email", widget: "string" }
          - { label: "Careers Email", name: "careers_email", widget: "string" }
          - { label: "Phone Display", name: "phone_display", widget: "string" }
          - { label: "Phone Link", name: "phone_href", widget: "string", hint: "Example: tel:+18182621520" }
          - { label: "WhatsApp Link", name: "whatsapp_url", widget: "string" }
          - { label: "Business Hours", name: "business_hours", widget: "string" }
          - { label: "Weekend Hours", name: "weekend_hours", widget: "string" }
          - { label: "Emergency Note", name: "emergency_note", widget: "string" }
          - { label: "Email Response Time", name: "email_response", widget: "string" }
          - { label: "WhatsApp Response Time", name: "whatsapp_response", widget: "string" }
          - { label: "Phone Response Time", name: "phone_response", widget: "string" }
          - { label: "Weekend Response Time", name: "weekend_response", widget: "string" }
          - { label: "Fastest Response Text", name: "fastest_response", widget: "string" }
          - { label: "Footer WhatsApp Note", name: "whatsapp_note", widget: "string" }
          - { label: "Formspree Endpoint", name: "formspree_endpoint", widget: "string" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "content/home.json"
        fields:
          - { label: "Hero Title HTML", name: "hero_title_html", widget: "text", hint: "HTML is allowed. Example: Learn Languages<br>the Modern Way" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "French Card Title", name: "french_title", widget: "string" }
          - { label: "French Card Description", name: "french_description", widget: "text" }
          - { label: "Spanish Card Title", name: "spanish_title", widget: "string" }
          - { label: "Spanish Card Description", name: "spanish_description", widget: "text" }
          - { label: "Why Title HTML", name: "why_title_html", widget: "text" }
          - label: "Features"
            name: "features"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - { label: "CTA Title", name: "cta_title", widget: "string" }
          - { label: "CTA Text", name: "cta_text", widget: "text" }
          - { label: "CTA Primary Button", name: "cta_primary", widget: "string" }
          - { label: "CTA Secondary Button", name: "cta_secondary", widget: "string" }

      - label: "Pricing Page"
        name: "pricing"
        file: "content/pricing.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - label: "Main Plans"
            name: "plans"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Period", name: "period", widget: "string" }
              - { label: "Saving Text", name: "saving", widget: "string" }
              - { label: "Button Text", name: "button", widget: "string" }
          - { label: "Services Title", name: "services_title", widget: "string" }
          - { label: "Guarantee Title HTML", name: "guarantee_title_html", widget: "text" }
          - { label: "Guarantee Text", name: "guarantee_text", widget: "text" }

      - label: "Contact Page"
        name: "contact"
        file: "content/contact.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Info Title", name: "info_title", widget: "string" }
          - { label: "Email Section Title", name: "email_section_title", widget: "string" }
          - { label: "Phone Section Title", name: "phone_section_title", widget: "string" }
          - { label: "Response Section Title", name: "response_section_title", widget: "string" }
          - { label: "Quick Contact Title", name: "quick_contact_title", widget: "string" }
          - { label: "Quick Contact Text", name: "quick_contact_text", widget: "string" }
          - { label: "Form Title", name: "form_title", widget: "string" }
          - { label: "FAQ Title", name: "faq_title", widget: "string" }
          - { label: "School Title", name: "school_title", widget: "string" }
          - { label: "School Text", name: "school_text", widget: "text" }
